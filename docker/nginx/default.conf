# HTTP → HTTPS redirect
server {
    listen 80;
    server_name ruichi.online www.ruichi.online;
    return 301 https://ruichi.online$request_uri;
}

server {
    listen 443 ssl;
    server_name ruichi.online www.ruichi.online;

    ssl_certificate     /etc/letsencrypt/live/ruichi.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ruichi.online/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # API — forward /api/v1/... to NestJS (which has globalPrefix 'api/v1')
    location /api/ {
        proxy_pass         http://api:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Frontend (Next.js)
    location / {
        proxy_pass         http://web:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
